stages:
  - validate

# Validate basic project structure
validate:
  stage: validate
  image: alpine:latest
  script:
    - echo "🔍 Validating project structure..."
    - test -f Dockerfile && echo "✅ Dockerfile found" || exit 1
    - test -f docker-compose.yml && echo "✅ docker-compose.yml found" || exit 1
    - test -f index.php && echo "✅ index.php found" || exit 1
    - test -f includes/db.php && echo "✅ includes/db.php found" || exit 1
    - test -f mobile_store.sql && echo "✅ mobile_store.sql found" || exit 1
    - echo "✅ All project files validated successfully!"
  only:
    - main
    - develop
